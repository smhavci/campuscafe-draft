<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Giriş Yap</h1>
        <p class="auth-subtitle">Hesabınıza giriş yapın</p>

        <!-- Role Tabs -->
        <div class="role-tabs">
            <button class="role-tab" [class.active]="selectedRole() === 'student'" (click)="selectRole('student')">🎓
                Öğrenci</button>
            <button class="role-tab" [class.active]="selectedRole() === 'teacher'" (click)="selectRole('teacher')">👨‍🏫
                Öğretmen</button>
            <button class="role-tab" [class.active]="selectedRole() === 'cafeOwner'" (click)="selectRole('cafeOwner')">☕
                Kafe Sahibi</button>
        </div>

        <form (ngSubmit)="onSubmit()" class="auth-form">
            @if (selectedRole() === 'student') {
            <div class="form-group">
                <label>Öğrenci Numarası</label>
                <input type="text" [(ngModel)]="studentNumber" name="studentNumber" required
                    placeholder="11 haneli numara" maxlength="11" />
            </div>
            } @else {
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" [(ngModel)]="email" name="email" required placeholder="ornek@email.com" />
            </div>
            }

            <div class="form-group">
                <label>Şifre</label>
                <input type="password" [(ngModel)]="password" name="password" required placeholder="Şifrenizi girin" />
            </div>

            @if (error()) {
            <div class="error-msg">{{ error() }}</div>
            }

            <button type="submit" class="submit-btn" [disabled]="loading()">
                {{ loading() ? 'Giriş yapılıyor...' : 'Giriş Yap' }}
            </button>
        </form>

        <p class="auth-footer">
            Hesabın yok mu? <a routerLink="/register">Kayıt Ol</a>
        </p>
    </div>
</div>
